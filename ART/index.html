<!-- onclick needed a reference -->

<script>
document.addEventListener('DOMContentLoaded', () => {
  const imageRow = document.getElementById('imageRow');
  const modalImage = document.getElementById('modalImage');
  const prev = document.querySelector('.prev');
  const next = document.querySelector('.next');
  let images = [];
  let current = 0;

  function updateImages() {
    images = Array.from(imageRow.querySelectorAll('img')).map(img => img.src);
    if (images.length > 0 && !modalImage.src) modalImage.src = images[0];
  }

  // Allow module scripts (deferred) to populate the gallery before reading images
  // DOMContentLoaded fires after module scripts execute, but we guard with a small timeout
  setTimeout(updateImages, 0);

  function show(index) {
    if (images.length === 0) return;
    current = ((index % images.length) + images.length) % images.length;
    modalImage.src = images[current];
  }

  prev.addEventListener('click', (e) => { e.preventDefault(); show(current - 1); });
  next.addEventListener('click', (e) => { e.preventDefault(); show(current + 1); });
});
</script>
